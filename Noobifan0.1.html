<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NoobiFan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@600;700&family=Unbounded:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #010204;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gold: #facc15;
            --surface: #0a0c14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.12), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.06), transparent 40%);
            color: var(--text);
            padding: calc(25px + env(safe-area-inset-top)) 16px 120px;
            min-height: 100vh;
        }

        .glass { background: var(--card); backdrop-filter: blur(30px); border: 1px solid var(--border); border-radius: 32px; padding: 24px; margin-bottom: 20px; }
        .label-xs { font-size: 9px; font-weight: 900; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 5px; }
        .val-xl { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: -1px; font-size: 38px; display: block; margin-bottom: 15px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .brand { display: flex; align-items: center; gap: 16px; }
        .logo { width: 68px; height: 68px; border-radius: 24px; background: linear-gradient(135deg, var(--primary), #818cf8); padding: 2px; box-shadow: 0 12px 35px var(--primary-glow); }
        .logo img { width: 100%; height: 100%; border-radius: 22px; object-fit: cover; }
        .rank-info { font-family: 'Unbounded'; font-size: 16px; }
        .rank-name { font-size: 9px; color: var(--gold); border: 1px solid var(--gold); padding: 2px 8px; border-radius: 6px; margin-top: 4px; display: inline-block; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 12px 8px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .stat-card .n { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; display: block; margin-top: 4px; }

        .info-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .info-box { flex: 1; padding: 15px; border-radius: 22px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); }

        .chart-container { height: 200px; margin-top: 15px; }

        .goal-box { border-left: 4px solid var(--primary); }
        .progress-bg { height: 10px; background: rgba(0,0,0,0.4); border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); width: 0%; transition: 1s ease-out; }

        #active-shift { display: none; background: linear-gradient(135deg, #0f172a, #020617); border: 1px solid var(--primary); box-shadow: 0 0 40px rgba(99, 102, 241, 0.2); }
        .timer-val { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 48px; text-align: center; margin: 20px 0; color: white; text-shadow: 0 0 20px var(--primary); letter-spacing: -2px; }

        .collection-scroller { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .collection-scroller::-webkit-scrollbar { display: none; }
        .nft-card { min-width: 100px; height: 140px; border-radius: 18px; background: #1e293b; border: 2px solid var(--border); position: relative; flex-shrink: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 30px; transition: 0.3s; }
        .nft-card img { width: 54px; height: 54px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.5)); transition: transform 0.3s ease; }
        .nft-card:hover img { transform: translateY(-4px) scale(1.05); }
        .nft-card.gold { border-color: var(--gold); box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
        .nft-card span { font-size: 9px; font-weight: 900; color: white; position: absolute; bottom: 10px; text-transform: uppercase; }

        .months-scroller { display: flex; gap: 15px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .months-scroller::-webkit-scrollbar { display: none; }
        .month-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 24px; padding: 20px; min-width: 260px; flex-shrink: 0; }
        .month-title { font-family: 'Unbounded'; font-size: 14px; color: var(--text); margin-bottom: 15px; text-align: center; letter-spacing: 1px; }
        .week-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 8px; }
        .week-day { text-align: center; font-size: 9px; font-weight: 900; color: var(--text-dim); text-transform: uppercase; }
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-cell { aspect-ratio: 1; border-radius: 8px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; font-size: 11px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: var(--text-dim); transition: 0.2s; }
        .day-cell.work { background: var(--primary); color: white; box-shadow: 0 4px 12px var(--primary-glow); }
        .day-cell.rest { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .day-empty { background: transparent; }

        .entry { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 28px; display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
        .entry-icon { width: 56px; height: 56px; border-radius: 20px; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 26px; overflow: hidden; }
        .entry-icon img { width: 100%; height: 100%; object-fit: cover; }
        .entry-info { flex: 1; }
        .entry-info h4 { font-weight: 800; font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .entry-info p { font-size: 11px; color: var(--text-dim); }
        .entry-mood { font-size: 14px; display: flex; align-items: center; justify-content: center; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: flex-end; }
        .modal.active { display: flex; }
        .drawer { width: 100%; background: var(--surface); border-radius: 40px 40px 0 0; padding: 35px 24px 60px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); max-height: 90vh; overflow-y: auto; border-top: 1px solid var(--border); }
        .modal.active .drawer { transform: translateY(0); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 10px; font-weight: 800; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .input { width: 100%; background: #000; border: 1px solid #1e293b; padding: 18px; border-radius: 20px; color: white; font-family: inherit; font-size: 16px; transition: 0.3s; }
        .input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .mood-selector { display: flex; gap: 10px; margin-top: 10px; }
        .mood-btn { flex: 1; height: 50px; border-radius: 15px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); cursor: pointer; transition: 0.2s; }
        .mood-btn.active { background: rgba(255,255,255,0.1); border-color: var(--primary); transform: scale(1.1); box-shadow: 0 0 15px var(--primary-glow); }
        .mood-icon { width: 24px; height: 24px; stroke-width: 2; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }

        .btn-prime { width: 100%; background: var(--primary); color: white; border: none; padding: 22px; border-radius: 22px; font-weight: 800; font-size: 16px; box-shadow: 0 15px 40px var(--primary-glow); }
        .fab { position: fixed; bottom: 30px; right: 24px; width: 75px; height: 75px; background: var(--primary); border-radius: 26px; display: flex; align-items: center; justify-content: center; color: white; font-size: 35px; box-shadow: 0 15px 45px var(--primary-glow); z-index: 1000; border: none; }

        .scroll-btns { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 20px; scrollbar-width: none; }
        .btn-pill { background: var(--card); border: 1px solid var(--border); color: white; padding: 14px 22px; border-radius: 100px; font-size: 11px; font-weight: 800; white-space: nowrap; }

        .tabs { display: flex; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 18px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 14px; border: none; background: none; color: var(--text-dim); font-weight: 800; font-size: 11px; border-radius: 14px; }
        .tab.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">
        <div class="logo">
            <img src="https://i.ibb.co/8gGTMfqX/IMG-20260315-103030-474.jpg" alt="NoobiFan">
        </div>
        <div class="brand-info">
            <div style="font-family:'Unbounded'; font-size:18px;">NoobiFan</div>
            <div id="v-rank" class="rank-name">НОВИЧОК</div>
        </div>
    </div>
    <div style="display:flex; gap:10px;">
        <div class="stat-card" style="padding: 10px 15px;" onclick="exportData()">📤</div>
        <div class="stat-card" style="padding: 10px 15px;" onclick="importData()">📥</div>
    </div>
</div>

<div class="glass">
    <span class="label-xs">Чистая прибыль за всё время</span>
    <span class="val-xl" id="v-total-net">0 ₽</span>

    <div class="info-row">
        <div class="info-box">
            <span class="label-xs">В неделю (среднее)</span>
            <div style="font-family:'Space Grotesk', sans-serif; font-size:16px; font-weight:700;" id="v-avg-week">0 ₽</div>
        </div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card"><span class="label-xs">Доходы</span><span class="n" id="v-total-gross">0 ₽</span></div>
        <div class="stat-card"><span class="label-xs">Налоги</span><span class="n" id="v-total-tax">0 ₽</span></div>
        <div class="stat-card"><span class="label-xs">Расходы</span><span class="n" id="v-total-exp">0 ₽</span></div>
        <div class="stat-card"><span class="label-xs">Записей</span><span class="n" id="v-days-total">0</span></div>
        <div class="stat-card"><span class="label-xs">Рабочих</span><span class="n" id="v-days-work">0</span></div>
        <div class="stat-card"><span class="label-xs">Выходных</span><span class="n" id="v-days-rest">0</span></div>
    </div>

    <div class="chart-container">
        <canvas id="monthChart"></canvas>
    </div>
</div>

<div class="glass" id="active-shift">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="label-xs" style="color:var(--success); margin:0;">● СМЕНА АКТИВНА</span>
        <span id="v-timer-end" style="font-size:11px; font-weight:800;">До 00:00</span>
    </div>
    <div class="timer-val" id="v-timer-clock">00:00:00</div>
    <div class="progress-bg"><div class="progress-fill" id="v-timer-bar"></div></div>
    <button class="btn-prime" style="background:var(--danger); padding:15px; font-size:12px;" onclick="stopTimer()">ЗАВЕРШИТЬ СМЕНУ</button>
</div>

<div class="glass">
    <span class="label-xs">NoobiFan Collection</span>
    <div class="collection-scroller" id="v-collection">
        <div class="nft-card" style="opacity:0.3"><img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Locked/3D/locked_3d.png"><span>?</span></div>
        <div class="nft-card" style="opacity:0.3"><img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Locked/3D/locked_3d.png"><span>?</span></div>
        <div class="nft-card" style="opacity:0.3"><img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Locked/3D/locked_3d.png"><span>?</span></div>
    </div>
</div>

<div class="glass goal-box" id="v-goal-widget" style="display:none;" onclick="openGoalModal()">
    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div style="font-family:'Unbounded'; font-size:16px;">🎯 <span id="v-goal-name">Цель</span></div>
        <div class="label-xs" id="v-goal-fraction" style="margin:0; font-family:'Space Grotesk', sans-serif;">0 / 0 ₽</div>
    </div>
    <div class="progress-bg"><div class="progress-fill" id="v-goal-bar"></div></div>
    <div style="display:flex; justify-content:space-between;">
        <span id="v-goal-days" style="font-size:10px; font-weight:700;">-- дн. осталось</span>
        <span id="v-goal-daily" style="font-family:'Space Grotesk', sans-serif; font-size:12px; font-weight:700; color:var(--warning);">-- ₽ / день</span>
    </div>
</div>

<div class="glass" style="padding-bottom: 5px;">
    <span class="label-xs" style="margin-bottom:15px;">АКТИВНОСТЬ (КАЛЕНДАРЬ)</span>
    <div class="months-scroller" id="v-grid-container"></div>
</div>

<div class="scroll-btns">
    <button class="btn-pill" onclick="openTimerForm()">⏲️ Запустить таймер</button>
    <button class="btn-pill" onclick="generateReport()">📑 Полный отчет (HTML)</button>
    <button class="btn-pill" onclick="openGoalModal()">🎯 Редактировать цель</button>
    <button class="btn-pill" style="color:var(--danger)" onclick="fullReset()">🧹 Сбросить систему</button>
</div>

<div id="v-list"></div>

<button class="fab" onclick="openEntryForm()">+</button>

<div class="modal" id="m-entry" onclick="if(event.target===this) closeModals()">
    <div class="drawer">
        <div class="tabs">
            <button class="tab active" id="t-work" onclick="setFormType('work')">РАБОТА</button>
            <button class="tab" id="t-rest" onclick="setFormType('rest')">ОТДЫХ</button>
        </div>
        <div class="form-group"><label>Дата</label><input type="date" id="f-date" class="input"></div>
        
        <div id="work-fields">
            <div style="display:flex; gap:12px;">
                <div class="form-group" style="flex:1;"><label>Доход</label><input type="number" id="f-gross" class="input" placeholder="0"></div>
                <div class="form-group" style="flex:1;"><label>Налог %</label><input type="number" id="f-tax" class="input" value="13"></div>
            </div>
            <div style="display:flex; gap:12px;">
                <div class="form-group" style="flex:1;"><label>Расходы</label><input type="number" id="f-exp" class="input" value="0"></div>
                <div class="form-group" style="flex:1;"><label>Смена</label>
                    <select id="f-shift" class="input"><option value="day">☀️ День</option><option value="night">🌙 Ночь</option></select>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Настроение после смены</label>
            <div class="mood-selector">
                <div class="mood-btn" onclick="setMood('🔥')" data-mood="🔥"><svg class="mood-icon" viewBox="0 0 24 24" style="color:#f59e0b"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></div>
                <div class="mood-btn" onclick="setMood('😎')" data-mood="😎"><svg class="mood-icon" viewBox="0 0 24 24" style="color:#10b981"><circle cx="12" cy="12" r="10"/><path d="M8 9.5h8"/><path d="M8 14.5c1.333 2 4.667 2 6 0"/><path d="M9 9.5v1.5"/><path d="M15 9.5v1.5"/></svg></div>
                <div class="mood-btn" onclick="setMood('😴')" data-mood="😴"><svg class="mood-icon" viewBox="0 0 24 24" style="color:#94a3b8"><circle cx="12" cy="12" r="10"/><path d="M8 14h8"/><path d="M9 9h.01"/><path d="M15 9h.01"/></svg></div>
                <div class="mood-btn" onclick="setMood('😫')" data-mood="😫"><svg class="mood-icon" viewBox="0 0 24 24" style="color:#f43f5e"><circle cx="12" cy="12" r="10"/><path d="M8 15c1.333-2 4.667-2 6 0"/><path d="M9 9l1.5 1.5"/><path d="M15 9l-1.5 1.5"/></svg></div>
                <div class="mood-btn" onclick="setMood('😡')" data-mood="😡"><svg class="mood-icon" viewBox="0 0 24 24" style="color:#ef4444"><circle cx="12" cy="12" r="10"/><path d="M8 15c1.333-2 4.667-2 6 0"/><path d="M8 9l2 1.5"/><path d="M16 9l-2 1.5"/></svg></div>
            </div>
        </div>

        <div class="form-group"><label>Заметка</label><input type="text" id="f-note" class="input" placeholder="..."></div>
        <button class="btn-prime" onclick="saveEntry()">СОХРАНИТЬ</button>
        <button id="f-del" style="display:none; color:var(--danger); background:none; border:none; width:100%; padding:20px; font-weight:800;" onclick="deleteEntry()">Удалить запись</button>
    </div>
</div>

<div class="modal" id="m-goal" onclick="if(event.target===this) closeModals()">
    <div class="drawer">
        <h2 style="font-family:'Unbounded'; margin-bottom:25px;">Настройка цели</h2>
        <div class="form-group"><label>Название</label><input type="text" id="g-name" class="input" placeholder="Напр: Квартира"></div>
        <div class="form-group"><label>Сумма (₽)</label><input type="number" id="g-sum" class="input" placeholder="0"></div>
        <div class="form-group"><label>Дата окончания</label><input type="date" id="g-date" class="input"></div>
        <button class="btn-prime" onclick="saveGoal()">УСТАНОВИТЬ ЦЕЛЬ</button>
    </div>
</div>

<div class="modal" id="m-timer" onclick="if(event.target===this) closeModals()">
    <div class="drawer">
        <h2 style="font-family:'Unbounded'; margin-bottom:25px;">Запуск таймера</h2>
        <div class="form-group"><label>Начало</label><input type="time" id="s-start" class="input"></div>
        <div class="form-group"><label>Конец</label><input type="time" id="s-end" class="input"></div>
        <button class="btn-prime" onclick="startTimer()">ПОГНАЛИ 🚀</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('nf5_db')) || [];
    let goal = JSON.parse(localStorage.getItem('nf5_goal')) || null;
    let timer = JSON.parse(localStorage.getItem('nf5_timer')) || null;
    let cards = JSON.parse(localStorage.getItem('nf5_cards')) || [];
    let editId = null, currentMood = '😎', currentType = 'work';
    let monthChart = null;

    const RANKS = [
        {n: "НОВИЧОК", min: 0}, {n: "ТРУДЯГА", min: 30000}, {n: "МАСТЕР", min: 100000},
        {n: "ПРОФИ", min: 300000}, {n: "АКУЛА", min: 700000}, {n: "ЛЕГЕНДА", min: 1500000}
    ];

    const CARD_POOL = [
        {i: '<img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Gem%20stone/3D/gem_stone_3d.png">', n: 'Алмаз'}, 
        {i: '<img src="https://i.ibb.co/609C6KDB/5573-1.jpg" style="border-radius:12px;">', n: 'Золотой'}, 
        {i: '<img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Rocket/3D/rocket_3d.png">', n: 'Скорость'},
        {i: '<img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Four%20leaf%20clover/3D/four_leaf_clover_3d.png">', n: 'Удача'}, 
        {i: '<img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Crown/3D/crown_3d.png">', n: 'Король'}, 
        {i: '<img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Mechanical%20arm/3D/mechanical_arm_3d.png">', n: 'Киборг'}
    ];

    const MOOD_SVGS = {
        '🔥': '<svg class="mood-icon" viewBox="0 0 24 24" style="color:#f59e0b; width:16px; height:16px;"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>',
        '😎': '<svg class="mood-icon" viewBox="0 0 24 24" style="color:#10b981; width:16px; height:16px;"><circle cx="12" cy="12" r="10"/><path d="M8 9.5h8"/><path d="M8 14.5c1.333 2 4.667 2 6 0"/><path d="M9 9.5v1.5"/><path d="M15 9.5v1.5"/></svg>',
        '😴': '<svg class="mood-icon" viewBox="0 0 24 24" style="color:#94a3b8; width:16px; height:16px;"><circle cx="12" cy="12" r="10"/><path d="M8 14h8"/><path d="M9 9h.01"/><path d="M15 9h.01"/></svg>',
        '😫': '<svg class="mood-icon" viewBox="0 0 24 24" style="color:#f43f5e; width:16px; height:16px;"><circle cx="12" cy="12" r="10"/><path d="M8 15c1.333-2 4.667-2 6 0"/><path d="M9 9l1.5 1.5"/><path d="M15 9l-1.5 1.5"/></svg>',
        '😡': '<svg class="mood-icon" viewBox="0 0 24 24" style="color:#ef4444; width:16px; height:16px;"><circle cx="12" cy="12" r="10"/><path d="M8 15c1.333-2 4.667-2 6 0"/><path d="M8 9l2 1.5"/><path d="M16 9l-2 1.5"/></svg>'
    };

    function init() {
        const now = new Date();
        document.getElementById('s-start').value = now.toTimeString().slice(0,5);
        document.getElementById('s-end').value = new Date(now.getTime() + 8*60*60*1000).toTimeString().slice(0,5);
        render();
        runTimerLoop();
    }

    function render() {
        const list = document.getElementById('v-list');
        list.innerHTML = '';
        let tGross = 0, tTax = 0, tExp = 0, tNet = 0;
        let dWork = 0, dRest = 0;

        db.sort((a,b) => new Date(b.date) - new Date(a.date));

        db.forEach(i => {
            if(i.type === 'work') {
                tGross += i.gross;
                tTax += (i.gross * i.tax / 100);
                tExp += i.exp;
                tNet += i.net;
                dWork++;
            } else if(i.type === 'rest') {
                dRest++;
            }

            const card = document.createElement('div');
            card.className = 'entry';
            card.onclick = () => openEdit(i.id);
            const icon = i.type === 'work' ? (i.shift==='day'?'☀️':'🌙') : '<img src="https://i.ibb.co/6J0zT0bx/IMG-20260316-022632-616.jpg">';
            const moodDisplay = MOOD_SVGS[i.mood] || i.mood || '';
            card.innerHTML = `
                <div class="entry-icon">${icon}</div>
                <div class="entry-info">
                    <h4>${new Date(i.date).toLocaleDateString('ru-RU', {day:'2-digit', month:'long'})} <span class="entry-mood">${moodDisplay}</span></h4>
                    <p>${i.type==='work'?'Рабочая смена':'Отдых'} ${i.note ? '• '+i.note : ''}</p>
                </div>
                <div style="text-align:right; font-family:'Space Grotesk', sans-serif; font-size:14px; font-weight:700; color:${i.net > 0 ? 'var(--success)' : 'var(--text-dim)'}">
                    ${i.net > 0 ? '+'+i.net.toLocaleString()+' ₽' : '—'}
                </div>
            `;
            list.appendChild(card);
        });

        document.getElementById('v-total-net').innerText = tNet.toLocaleString() + ' ₽';
        document.getElementById('v-total-gross').innerText = tGross.toLocaleString() + ' ₽';
        document.getElementById('v-total-tax').innerText = Math.round(tTax).toLocaleString() + ' ₽';
        document.getElementById('v-total-exp').innerText = tExp.toLocaleString() + ' ₽';
        document.getElementById('v-days-total').innerText = db.length;
        document.getElementById('v-days-work').innerText = dWork;
        document.getElementById('v-days-rest').innerText = dRest;

        const weeks = Math.max(1, db.length / 7);
        document.getElementById('v-avg-week').innerText = Math.round(tNet / weeks).toLocaleString() + ' ₽';

        const rank = [...RANKS].reverse().find(r => tNet >= r.min) || RANKS[0];
        document.getElementById('v-rank').innerText = rank.n;

        updateGoal(tNet, dWork);
        updateGrid();
        updateMonthChart();
        updateCollection();
        
        localStorage.setItem('nf5_db', JSON.stringify(db));
        localStorage.setItem('nf5_cards', JSON.stringify(cards));
    }

    function updateCollection() {
        const container = document.getElementById('v-collection');
        container.innerHTML = '';
        cards.forEach(c => {
            const div = document.createElement('div');
            div.className = 'nft-card gold';
            div.innerHTML = `${c.i}<span>${c.n}</span>`;
            container.appendChild(div);
        });
        if(cards.length < 3) {
            for(let i=0; i < (3 - cards.length); i++) {
                const lock = document.createElement('div');
                lock.className = 'nft-card';
                lock.style.opacity = '0.2';
                lock.innerHTML = '<img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Locked/3D/locked_3d.png"><span>?</span>';
                container.appendChild(lock);
            }
        }
    }

    function checkCardDrop() {
        if(db.length > 0 && db.length % 5 === 0) {
            const drop = CARD_POOL[Math.floor(Math.random() * CARD_POOL.length)];
            if(!cards.find(c => c.n === drop.n)) {
                cards.push(drop);
                alert(`🎉 ТЫ ВЫБИЛ КАРТУ: ${drop.n}!`);
            }
        }
    }

    function updateMonthChart() {
        const ctx = document.getElementById('monthChart').getContext('2d');
        if(monthChart) monthChart.destroy();
        
        const monthlyData = {};
        db.forEach(i => {
            const m = new Date(i.date).toLocaleDateString('ru-RU', {month:'short'});
            monthlyData[m] = (monthlyData[m] || 0) + i.net;
        });

        monthChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(monthlyData).reverse(),
                datasets: [{
                    label: 'Чистая прибыль',
                    data: Object.values(monthlyData).reverse(),
                    backgroundColor: '#6366f1',
                    borderRadius: 8
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { 
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } },
                    y: { display: false }
                },
                maintainAspectRatio: false
            }
        });
    }

    function startTimer() {
        const s = document.getElementById('s-start').value, e = document.getElementById('s-end').value;
        const now = new Date();
        const st = new Date(now.toDateString() + ' ' + s);
        let en = new Date(now.toDateString() + ' ' + e);
        if(en < st) en.setDate(en.getDate() + 1);
        timer = { start: st.getTime(), end: en.getTime() };
        localStorage.setItem('nf5_timer', JSON.stringify(timer));
        closeModals();
    }

    function stopTimer() { if(confirm('Завершить смену?')) { timer = null; localStorage.removeItem('nf5_timer'); } }

    function runTimerLoop() {
        setInterval(() => {
            const el = document.getElementById('active-shift');
            if(!timer) { el.style.display = 'none'; return; }
            el.style.display = 'block';
            const now = Date.now(), total = timer.end - timer.start, rem = timer.end - now;
            if(rem <= 0) { timer = null; localStorage.removeItem('nf5_timer'); return; }
            const h = Math.floor(rem/3600000), m = Math.floor((rem%3600000)/60000), s = Math.floor((rem%60000)/1000);
            document.getElementById('v-timer-clock').innerText = `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            document.getElementById('v-timer-bar').style.width = Math.max(0, Math.min(100, ((now - timer.start)/total)*100)) + '%';
            document.getElementById('v-timer-end').innerText = 'До ' + new Date(timer.end).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    }

    function updateGoal(net, workDays) {
        const box = document.getElementById('v-goal-widget');
        if(!goal) { box.style.display = 'none'; return; }
        box.style.display = 'block';
        document.getElementById('v-goal-name').innerText = goal.name;
        document.getElementById('v-goal-fraction').innerText = `${net.toLocaleString()} / ${goal.sum.toLocaleString()} ₽`;
        document.getElementById('v-goal-bar').style.width = Math.min(100, (net/goal.sum)*100) + '%';
        const diff = Math.ceil((new Date(goal.date) - new Date()) / (1000*60*60*24));
        if(diff > 0) {
            document.getElementById('v-goal-days').innerText = `${diff} дн. осталось`;
            document.getElementById('v-goal-daily').innerText = `${Math.max(0, Math.ceil((goal.sum - net)/diff)).toLocaleString()} ₽ / день`;
        }
    }

    function updateGrid() {
        const container = document.getElementById('v-grid-container');
        container.innerHTML = '';
        const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
        const year = new Date().getFullYear();
        const weekDays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

        months.forEach((mName, mIndex) => {
            const daysInMonth = new Date(year, mIndex + 1, 0).getDate();
            const firstDay = new Date(year, mIndex, 1).getDay();
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;

            const mCard = document.createElement('div');
            mCard.className = 'month-card';

            const mTitle = document.createElement('div');
            mTitle.className = 'month-title';
            mTitle.innerText = mName;
            mCard.appendChild(mTitle);

            const wHeader = document.createElement('div');
            wHeader.className = 'week-header';
            weekDays.forEach(wd => {
                const w = document.createElement('div');
                w.className = 'week-day';
                w.innerText = wd;
                wHeader.appendChild(w);
            });
            mCard.appendChild(wHeader);

            const mGrid = document.createElement('div');
            mGrid.className = 'month-grid';

            for(let i=0; i<startOffset; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-empty';
                mGrid.appendChild(empty);
            }

            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(mIndex+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const entry = db.find(x => x.date === dateStr);

                const cell = document.createElement('div');
                cell.className = 'day-cell';
                if(entry) {
                    cell.classList.add(entry.type);
                }
                cell.innerText = d;
                mGrid.appendChild(cell);
            }

            mCard.appendChild(mGrid);
            container.appendChild(mCard);
        });

        setTimeout(() => {
            const currentMonthIndex = new Date().getMonth();
            const cards = container.querySelectorAll('.month-card');
            if(cards[currentMonthIndex]) {
                cards[currentMonthIndex].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
        }, 100);
    }

    function openEntryForm() {
        editId = null; 
        document.getElementById('m-entry').classList.add('active');
        document.getElementById('f-del').style.display = 'none';
        document.getElementById('f-date').valueAsDate = new Date();
        setFormType('work'); setMood('😎');
    }

    function openEdit(id) {
        editId = id; const i = db.find(x => x.id === id);
        document.getElementById('m-entry').classList.add('active');
        document.getElementById('f-del').style.display = 'block';
        setFormType(i.type); setMood(i.mood || '😎');
        document.getElementById('f-date').value = i.date;
        document.getElementById('f-gross').value = i.gross || 0;
        document.getElementById('f-tax').value = i.tax || 13;
        document.getElementById('f-exp').value = i.exp || 0;
        document.getElementById('f-shift').value = i.shift || 'day';
        document.getElementById('f-note').value = i.note || '';
    }

    function setFormType(t) {
        currentType = t;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        const target = document.getElementById('t-' + t);
        if(target) target.classList.add('active');
        document.getElementById('work-fields').style.display = t === 'work' ? 'block' : 'none';
    }

    function setMood(m) {
        currentMood = m;
        document.querySelectorAll('.mood-btn').forEach(b => {
            b.classList.remove('active');
            if(b.dataset.mood === m) b.classList.add('active');
        });
    }

    function saveEntry() {
        const gross = Number(document.getElementById('f-gross').value) || 0;
        const tax = Number(document.getElementById('f-tax').value) || 0;
        const exp = Number(document.getElementById('f-exp').value) || 0;
        const net = currentType === 'work' ? Math.round(gross - (gross * tax / 100) - exp) : 0;

        const data = {
            id: editId || Date.now(),
            type: currentType,
            date: document.getElementById('f-date').value,
            gross, tax, exp, net,
            shift: document.getElementById('f-shift').value,
            mood: currentMood,
            note: document.getElementById('f-note').value
        };

        if(editId) db = db.map(x => x.id === editId ? data : x);
        else { db.push(data); checkCardDrop(); }
        
        closeModals(); render();
    }

    function deleteEntry() { if(confirm('Удалить?')) { db = db.filter(x => x.id !== editId); closeModals(); render(); } }

    function saveGoal() {
        goal = {
            name: document.getElementById('g-name').value,
            sum: Number(document.getElementById('g-sum').value),
            date: document.getElementById('g-date').value
        };
        localStorage.setItem('nf5_goal', JSON.stringify(goal));
        closeModals(); render();
    }

    function exportData() {
        const s = btoa(unescape(encodeURIComponent(JSON.stringify({db, goal, cards}))));
        navigator.clipboard.writeText(s); alert('Код синхронизации скопирован!');
    }

    function importData() {
        const s = prompt('Вставьте код:');
        if(s) {
            try {
                const d = JSON.parse(decodeURIComponent(escape(atob(s))));
                db = d.db; goal = d.goal; cards = d.cards || [];
                render(); alert('Данные загружены!');
            } catch(e) { alert('Ошибка кода'); }
        }
    }

    function generateReport() {
        let rows = db.map(i => `
            <tr>
                <td>${i.date}</td>
                <td>${i.type === 'work' ? 'Работа' : 'Отдых'}</td>
                <td>${i.gross || 0} ₽</td>
                <td>${i.net || 0} ₽</td>
                <td>${i.mood || '—'}</td>
                <td>${i.note || ''}</td>
            </tr>
        `).join('');
        
        const html = `
            <html>
            <head>
                <meta charset="utf-8">
                <style>
                    body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 40px; color: #1e293b; }
                    .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
                    h1 { color: #6366f1; }
                    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                    th { background: #6366f1; color: white; padding: 15px; text-align: left; }
                    td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
                </style>
            </head>
            <body>
                <div class="card">
                    <h1>NoobiFan: Финансовый отчет</h1>
                    <p>Сгенерировано: ${new Date().toLocaleString()}</p>
                    <p>Итого чистая прибыль: <b>${document.getElementById('v-total-net').innerText}</b></p>
                    <table>
                        <thead><tr><th>Дата</th><th>Тип</th><th>Доходы</th><th>Чистыми</th><th>Настроение</th><th>Заметка</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            </body>
            </html>
        `;
        const blob = new Blob([html], {type: 'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'noobifan_report.html'; a.click();
    }

    function fullReset() { if(confirm('Удалить ВСЕ данные безвозвратно?')) { localStorage.clear(); location.reload(); } }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
    function openGoalModal() { document.getElementById('m-goal').classList.add('active'); if(goal){ document.getElementById('g-name').value=goal.name; document.getElementById('g-sum').value=goal.sum; document.getElementById('g-date').value=goal.date; } }
    function openTimerForm() { document.getElementById('m-timer').classList.add('active'); }

    init();
</script>

</body>
</html>
